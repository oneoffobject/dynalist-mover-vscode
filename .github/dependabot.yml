version: 2
updates:
  # Keep devDependencies (TypeScript, types, vsce) up to date.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  # Keep GitHub Actions versions current (avoids runtime deprecations).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
